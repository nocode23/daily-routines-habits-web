<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 1200px; height: 630px; overflow: hidden; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", sans-serif;
    background: #F2F2F7;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  .blob-1, .blob-2 {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
  }
  .blob-1 {
    width: 700px; height: 700px;
    top: -260px; right: -140px;
    background: radial-gradient(circle, rgba(0,122,255,0.18) 0%, transparent 70%);
  }
  .blob-2 {
    width: 560px; height: 560px;
    bottom: -220px; left: -120px;
    background: radial-gradient(circle, rgba(88,86,214,0.15) 0%, transparent 70%);
  }

  .inner {
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 0 84px;
  }

  .text { max-width: 660px; }

  .app-icon {
    width: 116px; height: 116px;
    border-radius: 22.5%;
    overflow: hidden;
    box-shadow: 0 14px 44px rgba(0, 122, 255, 0.35);
    margin-bottom: 38px;
  }
  .app-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

  h1 {
    font-size: 74px;
    line-height: 1.06;
    font-weight: 800;
    letter-spacing: -0.025em;
    color: #090909;
    margin-bottom: 26px;
  }

  .tagline {
    font-size: 31px;
    line-height: 1.35;
    font-weight: 500;
    color: #50505a;
    margin-bottom: 36px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 11px;
    background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
    color: #fff;
    padding: 14px 30px;
    border-radius: 100px;
    font-size: 24px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
  }
  .pill svg { width: 24px; height: 24px; fill: #fff; }

  /* iPhone frame, cropped by the bottom edge */
  .phone {
    position: relative;
    flex-shrink: 0;
    width: 374px;
    height: 760px;
    margin: 200px 64px 0 40px;
    background: #1a1a1c;
    border-radius: 58px;
    padding: 11px;
    box-shadow: 0 40px 90px rgba(9, 9, 30, 0.35);
    transform: rotate(-4deg);
  }
  .phone-screen {
    width: 100%; height: 100%;
    border-radius: 47px;
    overflow: hidden;
    background: #fff;
  }
  .phone-screen img { width: 100%; display: block; }
</style>
</head>
<body>
  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <div class="inner">
    <div class="text">
      <div class="app-icon"><img src="../../assets/images/app-icon.png" alt=""></div>
      <h1 data-i18n="title">Daily Routines<br>&amp; Habits</h1>
      <p class="tagline" data-i18n="tagline">Build better habits, one day at a time.</p>
      <span class="pill">
        <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        <span data-i18n="pill">iPhone &amp; iPad</span>
      </span>
    </div>

    <div class="phone">
      <div class="phone-screen">
        <img src="../../assets/images/01_dashboard.png" alt="">
      </div>
    </div>
  </div>

<script>
  const i18n = {
    en: {
      title: "Daily Routines<br>&amp; Habits",
      tagline: "Build better habits, one day at a time.",
      pill: "iPhone &amp; iPad",
    },
    cs: {
      title: "Denní rutiny<br>&amp; Návyky",
      tagline: "Buduj lepší návyky, den za dnem.",
      pill: "iPhone a iPad",
    },
  };
  const lang = new URLSearchParams(location.search).get("lang") || "en";
  document.documentElement.lang = lang;
  for (const el of document.querySelectorAll("[data-i18n]")) {
    el.innerHTML = i18n[lang][el.dataset.i18n];
  }
</script>
</body>
</html>
